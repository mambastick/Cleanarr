apiVersion: apps/v1
kind: Deployment
metadata:
  name: cleanarr
  namespace: cleanarr
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: cleanarr
  template:
    metadata:
      labels:
        app: cleanarr
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: cleanarr
          image: cleanarr:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8089
          envFrom:
            - secretRef:
                name: cleanarr-env
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: config
              mountPath: /config
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: cleanarr-config
        - name: tmp
          emptyDir: {}
